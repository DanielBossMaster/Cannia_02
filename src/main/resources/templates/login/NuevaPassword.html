<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña | Cannia</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#170022",
                        "background-light": "#F3E8FF",
                        "background-dark": "#18181B",
                    },
                    fontFamily: {
                        display: ["Poppins", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>


<div class="h-screen bg-[url('/img/pinguins.jpg')] bg-cover bg-center flex items-end justify-center">
    <a th:href="@{/inicio}" class="fixed top-4 left-4 z-50">
        <div class="w-12 h-12 rounded-full text-primary bg-white shadow-lg flex items-center justify-center
                transition-all duration-300 hover:scale-110 hover:bg-primary group hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="lucide lucide-house-icon lucide-house">
                <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/>
                <path d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            </svg>
        </div>
    </a>
    <div class="flex flex-col items-center justify-center min-h-screen px-4 py-8">
        <div class="bg-white  shadow-2xl  p-8">
            <div class="flex bg-white   flex-col items-center space-y-6">
                <img src="/img/logo.png" alt="logo" style="width:100px;">
                <h1 class="text-3xl font-bold text-primary">Crear nueva contraseña</h1>
                <p class="text-gray-500 text-center mb-6">
                    Ingresa una contraseña segura para tu cuenta.
                </p>
            <form th:action="@{/registro/reset-password}" method="post" onsubmit="return validarPasswords()" class="w-full space-y-4">
                <!-- token oculto -->
                <input type="hidden" name="token" th:value="${token}">
                <!-- contraseña -->
                <div>
                    <label  class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1">
                        Nueva contraseña
                    </label>
                    <div class="relative">
                        <input type="password"
                               id="password"
                               name="password"
                               required
                               placeholder="Ingresa tu nueva contraseña "
                               class="w-full px-6 py-3 bg-zinc-50 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 focus:ring-primary focus:border-primary text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500"/>
                        <button type="button"
                                onclick="togglePassword('password','iconEyeOpen1','iconEyeClosed1')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary transition">
                            <!-- OJO ABIERTO -->
                            <svg id="iconEyeOpen1"
                                 xmlns="http://www.w3.org/2000/svg"
                                 class="w-5 h-5"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- OJO CERRADO -->
                            <svg id="iconEyeClosed1"
                                 xmlns="http://www.w3.org/2000/svg"
                                 class="w-5 h-5 hidden"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.94 10.94 0 0112 20C5 20 1 12 1 12a21.86 21.86 0 015.06-6.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 8 11 8a21.82 21.82 0 01-2.16 3.19M1 1l22 22"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <!-- confirmar -->
                <div>
                    <label class="block text-sm font-medium text-zinc-700 dark:text-zinc-300 mb-1">
                        Confirmar contraseña
                    </label>
                    <div class="relative">
                        <input type="password"
                               id="confirmPassword"
                               required
                               placeholder="Repite la contraseña"
                               class="w-full px-6 py-3 bg-zinc-50 dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 focus:ring-primary focus:border-primary text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 dark:placeholder-zinc-500"/>
                        <button type="button"
                                onclick="togglePassword('confirmPassword','iconEyeOpen2','iconEyeClosed2')"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary transition">
                            <!-- OJO ABIERTO -->
                            <svg id="iconEyeOpen2"
                                 xmlns="http://www.w3.org/2000/svg"
                                 class="w-5 h-5"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <!-- OJO CERRADO -->
                            <svg id="iconEyeClosed2"
                                 xmlns="http://www.w3.org/2000/svg"
                                 class="w-5 h-5 hidden"
                                 fill="none"
                                 viewBox="0 0 24 24"
                                 stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.94 10.94 0 0112 20C5 20 1 12 1 12a21.86 21.86 0 015.06-6.94M9.9 4.24A10.94 10.94 0 0112 4c7 0 11 8 11 8a21.82 21.82 0 01-2.16 3.19M1 1l22 22"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <p id="errorMsg" class="text-red-500 text-sm mb-3 hidden">
                    Las contraseñas no coinciden
                </p>
                <button class=" w-full text-center font-bold mt-3 bg-primary text-white px-6 py-3 -md transition-all duration-300 ease-in-out hover:scale-105 hover:bg-white hover:text-black">
                    Actualizar contraseña
                </button>
                <a th:href="@{/login}">
                   <div class=" w-full text-center font-bold mt-3 bg-primary text-white px-6 py-3 -md transition-all duration-300 ease-in-out hover:scale-105 hover:bg-white hover:text-black">
                        Volver al login
                   </div>
                </a>
            </form>
            </div>
        </div>
    </div>
</div>
<script>

    function togglePassword(inputId, openIconId, closedIconId){

        const input = document.getElementById(inputId);

        const openIcon =
            document.getElementById(openIconId);

        const closedIcon =
            document.getElementById(closedIconId);

        if(input.type === "password"){

            input.type = "text";

            openIcon.classList.add("hidden");

            closedIcon.classList.remove("hidden");

        }else{

            input.type = "password";

            openIcon.classList.remove("hidden");

            closedIcon.classList.add("hidden");

        }

    }


    function validarPasswords(){

        let pass =
            document.getElementById("password").value;

        let confirm =
            document.getElementById("confirmPassword").value;

        let error =
            document.getElementById("errorMsg");

        if(pass !== confirm){

            error.classList.remove("hidden");

            return false;
        }

        return true;

    }

</script>



</html>
